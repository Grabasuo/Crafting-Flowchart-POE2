<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craft Plan</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
 
  <!-- TOP BAR -->
  <div class="top-bar">
    <label>Craft Plan</label>
    <input type="text" placeholder="Accou..." value="Accou..." />
    <button class="sync-btn">
      Sync
      <span class="sync-dot"></span>
    </button>
    <span class="spent-info">Spent: 0 Dis (0 Ex)</span>
    <label>Ex/Dis</label>
    <input type="number" value="400" />
    <div class="ex-div-val">400</div>
  </div>
 
  <!-- MAIN LAYOUT -->
  <div class="main">
 
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
 
      <!-- Craft selector -->
      <div class="craft-row">
        <input type="text" class="craft-select" placeholder="Nom du projet..." value="New Craft" />
        <div class="version-badge">0 : 0</div>
      </div>
 
      <!-- Template row -->
      <div class="template-row">
        <select class="template-select">
          <option>Templates</option>
        </select>
        <button class="btn btn-copy">Copy</button>
        <select class="template-select" style="width:50px; flex:none;">
          <option>FREE</option>
          <option>PRO</option>
        </select>
        <button class="btn btn-publish">Publish</button>
      </div>
 
      <!-- Update / Del -->
      <div class="action-row">
        <button class="btn-update">Update</button>
        <button class="btn-del">Del</button>
      </div>
 
      <!-- Template notice -->
      <div class="template-notice">
        Templates are tier-gated. Your crafts sync to your account when logged in.
      </div>
 
      <!-- Node add buttons -->
      <div class="node-row">
        <button class="btn-node">+ Step</button>
        <button class="btn-node">+ Result</button>
        <button class="btn-node">+ 3-Out</button>
        <button class="btn-node">+ 2-Out</button>
      </div>
 
      <!-- CRUD row -->
      <div class="crud-row">
        <button class="btn-save">Save</button>
        <button class="btn-new">New</button>
        <button class="btn-delete-red">Delete</button>
        <button class="btn-fit">Fit</button>
      </div>
 
      <!-- Export / Import -->
      <div class="io-row">
        <button class="btn-export">Export</button>
        <button class="btn-import">Import</button>
      </div>
 
      <!-- Search -->
      <div class="search-section">
        <div class="search-label">Search</div>
        <input
          type="text"
          class="search-input"
          placeholder="title / notes / item"
        />
      </div>
 
      <!-- Selected -->
      <div class="selected-section">
        <div class="selected-label">Selected</div>
        <div class="selected-hint">Select a node.</div>
      </div>
 
      <!-- Clear All -->
      <button class="btn-clear-all">Clear All</button>
    </div>
    <!-- /sidebar -->

    <!-- entre </div> sidebar et <div class="canvas-area"> -->
    <div class="resize-handle" id="resizeHandle"></div>
 
    <!-- CENTER CANVAS -->
    <div class="canvas-area">
      <div class="canvas-toolbar">
        <span class="zoom-pct">250%</span>
        <button class="btn-reset">Reset</button>
      </div>
      <div class="canvas-body"></div>
    </div>
 
    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="right-header">
        <span class="right-title">Prices (case-insensitive)</span>
        <button class="btn-close-panel">&#x2715;</button>
      </div>
      <div class="right-notice">
        Unit prices are applied to items inside nodes. TableTablet/TABLET counts as the same item.
      </div>
      <div class="right-empty">No items yet. Add items inside nodes.</div>
    </div>
 
  </div>
  <!-- /main -->

<script>
  const handle = document.getElementById('resizeHandle');
  const sidebar = document.querySelector('.sidebar');
  let dragging = false;
  let startX = 0;
  let startWidth = 0;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    startX = e.clientX;
    startWidth = sidebar.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newWidth = Math.max(150, Math.min(500, startWidth + delta));
    sidebar.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
</script>

<script src="script.js"></script>
 
</body>
</html>
